<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>فلسطين الحرة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo',sans-serif;
  overflow-x:hidden;
  background:black;
  color:white;
}

/* خلفية متحركة */
.hero{
  position:relative;
  height:100vh;
  background:
  linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),
  url('https://images.unsplash.com/photo-1521295121783-8a321d551ad2?q=80&w=1600&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  animation:bgMove 20s infinite alternate;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

@keyframes bgMove{
  0%{background-position:center top;}
  100%{background-position:center bottom;}
}

.overlay{
  max-width:900px;
  padding:20px;
  z-index:2;
}

h1{
  font-size:75px;
  margin-bottom:20px;
  text-shadow:0 0 25px red;
}

.subtitle{
  font-size:28px;
  color:#ddd;
  margin-bottom:40px;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  width:250px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  transition:.4s;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  background:rgba(255,255,255,0.15);
}

.card h2{
  color:#00ff88;
  margin-bottom:10px;
}

.counter{
  margin-top:50px;
  font-size:30px;
  background:rgba(255,255,255,.1);
  display:inline-block;
  padding:15px 35px;
  border-radius:50px;
  backdrop-filter:blur(10px);
}

.flag{
  position:absolute;
  width:200px;
  opacity:.15;
  animation:float 6s ease-in-out infinite;
}

.flag1{
  top:10%;
  left:5%;
}

.flag2{
  bottom:10%;
  right:5%;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0px);}
}

/* نجوم متحركة */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  top:0;
  left:0;
}

.stars span{
  position:absolute;
  display:block;
  width:3px;
  height:3px;
  background:white;
  animation:animate 10s linear infinite;
  opacity:.6;
}

@keyframes animate{
  0%{
    transform:translateY(0);
    opacity:0;
  }
  50%{
    opacity:1;
  }
  100%{
    transform:translateY(-1000px);
    opacity:0;
  }
}
</style>
</head>

<body>

<section class="hero">

<div class="stars">
  <span style="left:10%;animation-delay:0s"></span>
  <span style="left:20%;animation-delay:2s"></span>
  <span style="left:40%;animation-delay:4s"></span>
  <span style="left:60%;animation-delay:1s"></span>
  <span style="left:80%;animation-delay:3s"></span>
</div>

<img class="flag flag1" src="https://upload.wikimedia.org/wikipedia/commons/0/00/Flag_of_Palestine.svg">
<img class="flag flag2" src="https://upload.wikimedia.org/wikipedia/commons/0/00/Flag_of_Palestine.svg">

<div class="overlay">

<h1>فلسطين 🇵🇸</h1>

<p class="subtitle">
أرض الحضارة والصمود والتاريخ العريق
</p>

<div class="cards">

<div class="card">
<h2>القدس</h2>
<p>مدينة السلام والتاريخ الإسلامي العريق</p>
</div>

<div class="card">
<h2>غزة</h2>
<p>رمز الصمود والإرادة القوية</p>
</div>

<div class="card">
<h2>فلسطين</h2>
<p>هوية خالدة وثقافة ممتدة عبر الزمن</p>
</div>

</div>

<div class="counter">
👥 عدد الزوار:
<span id="visits">0</span>
</div>

</div>
</section>

<script>
async function updateCounter() {

  const namespace = "palestine-site-2026";
  const key = "visits";

  let response = await fetch(
    https://api.countapi.xyz/hit/${namespace}/${key}
  );

  let data = await response.json();

  document.getElementById("visits").innerText = data.value;
}

updateCounter();
</script>

</body>
</html>
