<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فلسطين الحرة</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1521295121783-8a321d551ad2');
    
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
}

.container{
    padding:40px 20px;
}

.logo{
    width:160px;
    height:160px;
    border-radius:50%;
    border:4px solid #00ff88;
    object-fit:cover;
    box-shadow:0 0 30px #00ff88;
}

h1{
    font-size:60px;
    margin-top:20px;
    color:#ffffff;
}

p{
    font-size:24px;
    color:#ddd;
}

.buttons{
    margin-top:40px;
}

a{
    display:block;
    width:280px;
    margin:15px auto;
    padding:18px;
    text-decoration:none;
    color:white;
    font-size:22px;
    border-radius:15px;
    transition:0.3s;
    font-weight:bold;
}

.instagram{
    background:#E1306C;
}

.youtube{
    background:#ff0000;
}

.tiktok{
    background:#111;
    border:2px solid white;
}

a:hover{
    transform:scale(1.08);
}

.counter{
    margin-top:40px;
    font-size:28px;
    color:#00ff88;
}

audio{
    margin-top:30px;
    width:300px;
}

.flag{
    font-size:70px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpeg.png" class="logo">

<div class="flag">🇵🇸</div>

<h1>فلسطين الحرة</h1>

<p>
القدس لنا وغزة صامدة ✌️
</p>

<div class="buttons">

<a class="instagram" href="https://www.instagram.com/palestine.russia?igsh=d3ZhNzZqenNmeHlt&utm_source=qr" target="_blank">
Instagram
</a>

<a class="youtube" href="https://youtube.com/@mohammed_elafifi?si=3PjYKSKseQ5CyIq2" target="_blank">
YouTube
</a>

<a class="tiktok" href="https://www.tiktok.com/@mohammed.elafifi?_r=1&_t=ZS-96YHcAwtKjt" target="_blank">
TikTok
</a>

</div>

<div class="counter">
👁️ عدد الزوار:
<span id="visits">1024</span>
</div>

<audio controls autoplay loop>
<source src="https://archive.org/download/palestine-national-anthem/palestine.mp3" type="audio/mpeg">
</audio>

</div>

</body>
</html>
