<title>Mohammed</title>

<link rel="icon" type="image/png" href="logo.jpeg.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: linear-gradient(135deg,#050816,#0f172a,#111827);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
text-align:center;
backdrop-filter: blur(15px);
background: rgba(255,255,255,0.05);
padding:40px 25px;
border-radius:30px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #38bdf8;
box-shadow:0 0 25px #38bdf8;
margin-bottom:20px;
}

h1{
font-size:45px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
margin-bottom:30px;
font-size:20px;
}

.btn{
display:block;
text-decoration:none;
background:linear-gradient(45deg,#0ea5e9,#38bdf8);
color:white;
padding:18px;
margin:15px 0;
border-radius:18px;
font-size:22px;
font-weight:bold;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.btn:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#38bdf8,#0ea5e9);
}

.footer{
margin-top:25px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpeg.png" class="profile">
